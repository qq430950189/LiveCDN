# Controller 配置
listen_addr: ":8080"
origin_addr: "http://origin:8080"    # HTTP 源站地址 (SRS HLS / HTTP-FLV)
rtmp_origin_addr: "origin:1935"        # RTMP 推流地址 (host:port, 不带 rtmp://)
reg_token: "reg-token-change-me"      # Agent 注册令牌
admin_token: "admin-token-change-me"  # 管理员令牌
cipher_suite: "chacha20-poly1305"   # chacha20-poly1305 / aes-128-cbc (兼容 chacha20 / aes128 别名)
hb_timeout: 15                        # 心跳超时(秒)
stale_node_timeout: 120               # 失效节点清理(秒)

# 域名切换池: 多域名轮询 + 秒级切换
# 管理员可通过 Web UI 切换激活域名, 所有新调度使用新域名
# domain_pool:
#   - cdn1.example.com
#   - cdn2.example.com
#   - img-cdn.example.com
