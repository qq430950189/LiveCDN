# SRS 源站配置 (v2: LL-HLS + HTTP-FLV + SRT)
# 延迟目标:
#   - LL-HLS: 2-3s
#   - HTTP-FLV: 0.8-1.5s
#   - SRT 推流: 200ms 延迟上限
# 推流鉴权: 回调 Controller 验证 stream_key

listen              1935;
max_connections     1000;
daemon              off;

# SRT 推流入口 (主播端低延迟推流)
srt_server {
    enabled         on;
    listen          8890;
    latency         200;        # SRT 延迟缓冲 200ms, 确定性延迟
    recv_latency    200;
    peer_latency    200;
}

http_server {
    listen          8080;
    dir             ./objs/nginx/html;
}

vhost __defaultVhost__ {
    # RTMP + HTTP-FLV 低延迟回源
    http_remux {
        enabled     on;
        mount       /live;
    }

    # 推流鉴权回调
    http_hooks {
        enabled         on;
        on_publish      http://controller:8080/api/hooks/on_publish;
        on_unpublish    http://controller:8080/api/hooks/on_unpublish;
    }

    # Forward 到备源 (主备高可用)
    # 主源推流自动 forward 到备源, 备源端口 1936
    forward {
        enabled    on;
        destination 127.0.0.1:1936;
        # 备源独立部署时改为:
        # destination origin-backup:1935;
    }

    # LL-HLS (Low-Latency HLS) - CMAF fMP4 200ms 分片
    hls {
        enabled         on;
        hls_path        ./objs/nginx/html;
        hls_fragment    0.2;            # 200ms 一片 (LL-HLS)
        hls_window      6;              # 30 个分片滑动窗口
        hls_cleanup     on;
        hls_dispose     30;
        hls_m3u8_file   [app]/[stream].m3u8;
        hls_ts_file     [app]/[stream]-[seq].m4s;  # fMP4 片段
        hls_aof_delay   0.2;
        hls_delay       0.2;

        # LL-HLS 部分 (SRS 5.0+)
        hls_ll_hls      on;
        hls_part_duration 0.2;          # partial segment 200ms
    }

    # DVR 录制 (可选, 按需开启)
    # dvr {
    #     enabled      on;
    #     dvr_path     ./objs/nginx/html/dvr/[app]/[stream].[timestamp].mp4;
    #     dvr_plan     session;
    # }
}

# API 管理
http_api {
    enabled     on;
    listen      1985;
    crossdomain on;
}
