# SRS 备源站配置
# 主源 forward 到备源, 主源挂了 Agent 自动切到备源拉流
# 部署: docker run --name livecdn-origin-backup -v ./origin/srs-backup.conf:/usr/local/srs/conf/srs.conf ossrs/srs:5

listen              1935;
max_connections     1000;
daemon              off;

http_server {
    listen          8090;
    dir             ./objs/nginx/html;
}

vhost __defaultVhost__ {
    # 接收主源的 forward 推流
    http_remux {
        enabled     on;
        mount       /live;
    }

    # LL-HLS
    hls {
        enabled         on;
        hls_path        ./objs/nginx/html;
        hls_fragment    0.2;
        hls_window      6;
        hls_cleanup     on;
        hls_dispose     30;
        hls_m3u8_file   [app]/[stream].m3u8;
        hls_ts_file     [app]/[stream]-[seq].m4s;
        hls_ll_hls      on;
        hls_part_duration 0.2;
    }
}

http_api {
    enabled     on;
    listen      1986;
    crossdomain on;
}
