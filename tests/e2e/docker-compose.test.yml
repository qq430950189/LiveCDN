# LiveCDN E2E core test environment
#
# This compose file intentionally starts only core VPS-side services.
# Edge Agents are part of the product's bare-metal/NAT-node path and must be
# tested via the single static binary + deploy/install.sh flow, not Docker.
#
# Usage:
#   docker compose -f tests/e2e/docker-compose.test.yml up --abort-on-container-exit

services:
  # === SRS 源站 ===
  origin:
    image: ossrs/srs:5
    ports:
      - "1935:1935"      # RTMP
      - "8088:8080"      # HTTP-FLV / HLS
      - "8890:8890/udp"  # SRT
    volumes:
      - ../../origin/srs.conf:/usr/local/srs/conf/srs.conf
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/versions"]
      interval: 5s
      timeout: 3s
      retries: 10

  # === Controller ===
  controller:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.controller
    ports:
      - "9080:8080"
    volumes:
      - ../../binaries:/app/binaries:ro
      - ../../deploy/install.sh:/app/deploy/install.sh:ro
    environment:
      - CONTROLLER_LISTEN=:8080
      - ORIGIN_ADDR=http://origin:8080
      - RTMP_ORIGIN_ADDR=origin:1935
      - REG_TOKEN=test-reg-token
      - ADMIN_TOKEN=test-admin-token
      - CIPHER_SUITE=chacha20
      - BINARY_DIR=/app/binaries
      - INSTALL_SCRIPT_PATH=/app/deploy/install.sh
    depends_on:
      origin:
        condition: service_healthy

  # === Web 播放器 ===
  web:
    image: nginx:alpine
    ports:
      - "9300:80"
    volumes:
      - ../../web:/usr/share/nginx/html:ro
    depends_on:
      - controller

  # === FFmpeg 推流 (彩条+时间戳) ===
  ffmpeg-publisher:
    image: linuxserver/ffmpeg:latest
    command:
      - -re
      - -f
      - lavfi
      - -i
      - "testsrc2=size=1280x720:rate=30,drawtext=text='%{pts\\:hms}':fontcolor=white:fontsize=36"
      - -f
      - lavfi
      - -i
      - "sine=frequency=440:beep_factor=4"
      - -c:v
      - libx264
      - -preset
      - ultrafast
      - -tune
      - zerolatency
      - -c:a
      - aac
      - -f
      - flv
      - "rtmp://origin:1935/live/test"
    depends_on:
      origin:
        condition: service_healthy

  # === Toxiproxy (Chaos 测试) ===
  # Use it against externally installed bare-metal Agents, e.g. upstream
  # "EDGE_AGENT_IP:9090". Do not model edge nodes as Docker services here.
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:latest
    ports:
      - "8474:8474"

  # === k6 压测 ===
  k6:
    image: grafana/k6:latest
    volumes:
      - ./k6:/scripts
    environment:
      - CONTROLLER_URL=http://controller:8080
    command: run /scripts/e2e.js
    depends_on:
      - controller
